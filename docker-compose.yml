version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: langchain
      POSTGRES_PASSWORD: langchain
      POSTGRES_DB: vectordb 
    ports:
      - "9000:9000"
    volumes:
      - pgdata:/var/lib/postgresql/data   # giữ data khi restart

  app:
    build: .
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+psycopg://langchain:langchain@db:9000/vectordb

volumes:
  pgdata: